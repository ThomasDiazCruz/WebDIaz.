<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <title>Administrador - Listado de Aspirantes</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</h:head>

<h:body>
<div class="container mt-4">
    <h2 class="mb-4">Vista Administrador - Aspirantes Registrados</h2>

    <h:panelGroup rendered="#{asp.listaAs.isEmpty()}">
        <div class="alert alert-warning">No hay aspirantes registrados aun.</div>
    </h:panelGroup>

    <h:panelGroup rendered="#{!asp.listaAs.isEmpty()}">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>N°</th>
                    <th>Identificacion</th>
                    <th>Nombres</th>
                    <th>Apellidos</th>
                    <th>Correo</th>
                    <th>Telefono</th>
                    <th>Programa Academico</th>
                    <th>Fecha Registro</th>
                </tr>
            </thead>
            <h:dataTable value="#{asp.listaAs}" var="a" styleClass="table">
                <h:column>
                    <h:outputText value="#{asp.listaAs.indexOf(a) + 1}"/>
                </h:column>
                <h:column>
                    <h:outputText value="#{a.id_p}"/>
                </h:column>
                <h:column>
                    <h:outputText value="#{a.nombres}"/>
                </h:column>
                <h:column>
                    <h:outputText value="#{a.apellidos}"/>
                </h:column>
                <h:column>
                    <h:outputText value="#{a.correo}"/>
                </h:column>
                <h:column>
                    <h:outputText value="#{a.telefono}"/>
                </h:column>
                <h:column>
                    <h:outputText value="#{a.pro_acad.nombre_prog}"/>
                </h:column>
                <h:column>
                    <h:outputText value="#{a.fecha_reg}"/>
                </h:column>
            </h:dataTable>
        </table>
    </h:panelGroup>

    <a href="asp.xhtml" class="btn btn-secondary mt-3">Volver al formulario</a>
</div>

<footer class="bg-light text-center py-3 mt-5 border-top">
    <p class="mb-0">Kevin Garzon | Programacion Avanzada | Universidad Distrital | 2026</p>
</footer>
</h:body>
</html>
